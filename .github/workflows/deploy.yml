name: Deploy to Cluster

on:
  # Auto-deploy when app pipeline updates image tags (pushes to master)
  push:
    branches:
      - master
      - dev
      - qa
      - prod
    paths:
      - 'values-*.yaml'

  # One-shot manual deploy to any cluster
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      namespace:
        description: 'Kubernetes namespace (default: dev-apm)'
        required: false
        default: 'dev-apm'
      dry_run:
        description: 'Dry run only (helm template, no install)'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Helm Deploy — ${{ github.event.inputs.environment || github.ref_name }}
    runs-on: [self-hosted, linux, taazaa.shared.runner.01]
    env:
      TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
      TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
    steps:
      - name: Checkout Helm charts repo
        uses: actions/checkout@v4

      - name: Resolve environment
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            NAMESPACE="${{ github.event.inputs.namespace }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            case "$BRANCH" in
              master) ENVIRONMENT="dev" ;;   # app pipeline pushes tags to master → deploy to dev
              *)      ENVIRONMENT="$BRANCH" ;;
            esac
            NAMESPACE="dev-apm"
            DRY_RUN="false"
          fi
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
          echo "NAMESPACE=$NAMESPACE"     >> $GITHUB_ENV
          echo "DRY_RUN=$DRY_RUN"         >> $GITHUB_ENV
          echo "VALUES_FILE=values-$ENVIRONMENT.yaml" >> $GITHUB_ENV
          echo "🎯 Deploying to: $ENVIRONMENT (namespace: $NAMESPACE, dry_run: $DRY_RUN)"

      - name: Select kubeconfig
        run: |
          mkdir -p ~/.kube
          case "$ENVIRONMENT" in
            dev)  echo "${{ secrets.KUBECONFIG_DEV }}"  > ~/.kube/config ;;
            qa)   echo "${{ secrets.KUBECONFIG_QA }}"   > ~/.kube/config ;;
            prod) echo "${{ secrets.KUBECONFIG_PROD }}" > ~/.kube/config ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac
          chmod 600 ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repositories
        run: |
          helm repo add grafana         https://grafana.github.io/helm-charts
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts/
          helm repo add altinity        https://altinity.github.io/clickhouse-operator/
          helm repo add open-telemetry  https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add bitnami         https://charts.bitnami.com/bitnami
          helm repo add nfs-provisioner https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
          helm repo update

      - name: Helm dependency update
        run: helm dependency update .

      - name: Helm dry run
        if: env.DRY_RUN == 'true'
        run: |
          helm template dev-apm . \
            --namespace $NAMESPACE \
            --values ./values.yaml \
            --values ./$VALUES_FILE \
            --set "global.registry.username=$TCR_USERNAME" \
            --set "global.registry.password=$TCR_PASSWORD" \
            --debug


      - name: Helm deploy
        if: env.DRY_RUN == 'false'
        run: |
          helm upgrade --install dev-apm . \
            --namespace $NAMESPACE \
            --create-namespace \
            --values ./values.yaml \
            --values ./$VALUES_FILE \
            --set "global.registry.username=$TCR_USERNAME" \
            --set "global.registry.password=$TCR_PASSWORD" \
            --wait --timeout 15m \
            --atomic
          echo "✅ Deployed dev-apm to $ENVIRONMENT"

      - name: Verify rollout
        if: env.DRY_RUN == 'false'
        run: |
          echo "--- Pods ---"
          kubectl get pods -n $NAMESPACE
          echo "--- Helm releases ---"
          helm list -n $NAMESPACE

      - name: Post-job cleanup
        if: always()
        run: rm -f ~/.kube/config
