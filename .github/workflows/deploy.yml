name: Deploy to Cluster

on:
  # Auto-deploy when app pipeline updates a values file
  push:
    branches:
      - dev
      - qa
      - prod
    paths:
      - 'values-*.yaml'

  # One-shot manual deploy to any cluster
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      namespace:
        description: 'Kubernetes namespace (default: dev-apm)'
        required: false
        default: 'dev-apm'
      dry_run:
        description: 'Dry run only (helm template, no install)'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Helm Deploy — ${{ github.event.inputs.environment || github.ref_name }}
    runs-on: [self-hosted, linux, taazaa.shared.runner.01]
    steps:
      - name: Checkout Helm charts repo
        uses: actions/checkout@v4

      - name: Resolve environment
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            NAMESPACE="${{ github.event.inputs.namespace }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          else
            ENVIRONMENT="${GITHUB_REF#refs/heads/}"
            NAMESPACE="dev-apm"
            DRY_RUN="false"
          fi
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
          echo "NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
          echo "DRY_RUN=$DRY_RUN" >> $GITHUB_ENV
          echo "VALUES_FILE=values-$ENVIRONMENT.yaml" >> $GITHUB_ENV
          echo "🎯 Deploying to: $ENVIRONMENT (namespace: $NAMESPACE, dry_run: $DRY_RUN)"

      - name: Select kubeconfig
        run: |
          mkdir -p ~/.kube
          case "$ENVIRONMENT" in
            dev)  echo "${{ secrets.KUBECONFIG_DEV }}"  > ~/.kube/config ;;
            qa)   echo "${{ secrets.KUBECONFIG_QA }}"   > ~/.kube/config ;;
            prod) echo "${{ secrets.KUBECONFIG_PROD }}" > ~/.kube/config ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac
          chmod 600 ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm dependency update
        run: helm dependency update .

      - name: Create namespace & image pull secret
        if: env.DRY_RUN == 'false'
        run: |
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry harbor-pull-secret \
            --namespace $NAMESPACE \
            --docker-server=tcr.taazaa.cloud \
            --docker-username=${{ secrets.TCR_USERNAME }} \
            --docker-password=${{ secrets.TCR_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm dry run
        if: env.DRY_RUN == 'true'
        run: |
          helm template dev-apm . \
            --namespace $NAMESPACE \
            --values ./values.yaml \
            --values ./$VALUES_FILE \
            --debug

      - name: Helm deploy
        if: env.DRY_RUN == 'false'
        run: |
          helm upgrade --install dev-apm . \
            --namespace $NAMESPACE \
            --create-namespace \
            --values ./values.yaml \
            --values ./$VALUES_FILE \
            --set global.imagePullSecrets[0]=harbor-pull-secret \
            --wait --timeout 15m \
            --atomic
          echo "✅ Deployed dev-apm to $ENVIRONMENT"

      - name: Verify rollout
        if: env.DRY_RUN == 'false'
        run: |
          echo "--- Pods ---"
          kubectl get pods -n $NAMESPACE
          echo "--- Helm releases ---"
          helm list -n $NAMESPACE
