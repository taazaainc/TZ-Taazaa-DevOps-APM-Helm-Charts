{{- if .Values.victoriametrics.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dev-apm.fullname" . }}-victoriametrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dev-apm.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
spec:
  replicas: {{ .Values.victoriametrics.replicas }}
  selector:
    matchLabels:
      {{- include "dev-apm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: victoriametrics
  strategy:
    # Single-node VM requires Recreate to avoid data corruption
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "dev-apm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: victoriametrics
    spec:
      serviceAccountName: {{ include "dev-apm.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: victoriametrics
          image: {{ include "dev-apm.image" (dict "global" .Values.global "image" .Values.victoriametrics.image) }}
          imagePullPolicy: {{ .Values.victoriametrics.image.pullPolicy }}
          args:
            - "-storageDataPath=/storage"
            - "-retentionPeriod={{ .Values.victoriametrics.retentionPeriod }}"
            - "-httpListenAddr=:8428"
            - "-search.maxQueryDuration=60s"
            - "-search.maxConcurrentRequests=8"
            - "-memory.allowedPercent=80"
          ports:
            - name: http
              containerPort: 8428
              protocol: TCP
          volumeMounts:
            - name: storage
              mountPath: /storage
          resources:
            {{- toYaml .Values.victoriametrics.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: storage
          {{- if .Values.victoriametrics.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "dev-apm.fullname" . }}-victoriametrics
          {{- else }}
          emptyDir: {}
          {{- end }}

---

{{- if .Values.victoriametrics.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dev-apm.fullname" . }}-victoriametrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dev-apm.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
spec:
  {{- if .Values.victoriametrics.persistence.storageClass }}
  storageClassName: {{ .Values.victoriametrics.persistence.storageClass }}
  {{- end }}
  accessModes:
    - {{ .Values.victoriametrics.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.victoriametrics.persistence.size }}
{{- end }}

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "dev-apm.fullname" . }}-victoriametrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dev-apm.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
spec:
  type: {{ .Values.victoriametrics.service.type }}
  selector:
    {{- include "dev-apm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
  ports:
    - name: http
      port: {{ .Values.victoriametrics.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
