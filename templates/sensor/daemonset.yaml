{{- if .Values.sensor.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "dev-apm.fullname" . }}-sensor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dev-apm.labels" . | nindent 4 }}
    app.kubernetes.io/component: sensor
spec:
  selector:
    matchLabels:
      {{- include "dev-apm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sensor
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "dev-apm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: sensor
      annotations:
        # Force pod restart on config change
        checksum/config: {{ include (print $.Template.BasePath "/sensor/daemonset.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "dev-apm.serviceAccountName" . }}
      hostPID: {{ .Values.sensor.hostPID }}
      hostNetwork: {{ .Values.sensor.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 10

      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.sensor.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.sensor.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: sensor
          image: {{ include "dev-apm.image" (dict "global" .Values.global "image" .Values.sensor.image) }}
          imagePullPolicy: {{ .Values.sensor.image.pullPolicy }}

          securityContext:
            {{- toYaml .Values.sensor.securityContext | nindent 12 }}

          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_COLLECTOR_ENDPOINT
              value: "{{ include "dev-apm.fullname" . }}-collector:4317"
            - name: LOG_LEVEL
              value: {{ .Values.sensor.logLevel | quote }}
            {{- with .Values.sensor.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          volumeMounts:
            # Host /proc and /sys for eBPF
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            # Debugfs for eBPF tracing
            - name: debugfs
              mountPath: /sys/kernel/debug
            # Container runtime socket for metadata
            - name: cri-socket
              mountPath: /run/containerd/containerd.sock
              readOnly: true
            # eBPF maps
            - name: bpf-maps
              mountPath: /sys/fs/bpf

          resources:
            {{- toYaml .Values.sensor.resources | nindent 12 }}

          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
        - name: cri-socket
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
        - name: bpf-maps
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
{{- end }}
