{{- if .Values.rum.ingest.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dev-apm.fullname" . }}-rum-ingest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dev-apm.labels" . | nindent 4 }}
    app.kubernetes.io/component: rum-ingest
spec:
  replicas: {{ .Values.rum.ingest.replicas }}
  selector:
    matchLabels:
      {{- include "dev-apm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: rum-ingest
  template:
    metadata:
      labels:
        {{- include "dev-apm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: rum-ingest
    spec:
      serviceAccountName: {{ include "dev-apm.serviceAccountName" . }}
      containers:
        - name: rum-ingest
          image: {{ include "dev-apm.image" (dict "global" .Values.global "image" .Values.rum.ingest.image) }}
          imagePullPolicy: {{ .Values.rum.ingest.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.rum.ingest.service.port }}
          env:
            - name: PORT
              value: {{ .Values.rum.ingest.service.port | quote }}
            - name: CLICKHOUSE_ADDR
              value: "chi-{{ include "dev-apm.fullname" . }}-clickhouse-{{ .Values.clickhouse.clusterName }}-0-0:9000"
            - name: CLICKHOUSE_DB
              value: {{ .Values.clickhouse.auth.database | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.auth.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              {{- include "dev-apm.clickhousePassword" . | nindent 14 }}
          resources:
            {{- toYaml .Values.rum.ingest.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dev-apm.fullname" . }}-rum-ingest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dev-apm.labels" . | nindent 4 }}
    app.kubernetes.io/component: rum-ingest
spec:
  type: {{ .Values.rum.ingest.service.type }}
  selector:
    {{- include "dev-apm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: rum-ingest
  ports:
    - name: http
      port: {{ .Values.rum.ingest.service.port }}
      targetPort: http
{{- end }}
