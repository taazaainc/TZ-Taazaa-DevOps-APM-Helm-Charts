{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dev-apm.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dev-apm.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "dev-apm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "dev-apm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: {{ include "dev-apm.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "dev-apm.image" (dict "global" .Values.global "image" .Values.backend.image) }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            # VictoriaMetrics — sub-chart service name pattern: {release}-victoria-metrics-single-server
            - name: VICTORIAMETRICS_URL
              value: "http://{{ .Release.Name }}-victoria-metrics-single-server:8428"
            # ClickHouse — Altinity operator creates service: chi-{release}-clickhouse-{cluster}-0-0
            - name: CLICKHOUSE_ADDR
              value: "chi-{{ include "dev-apm.fullname" . }}-clickhouse-{{ .Values.clickhouse.clusterName }}-0-0:9000"
            - name: CLICKHOUSE_DB
              value: {{ .Values.clickhouse.auth.database | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.auth.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              {{- include "dev-apm.clickhousePassword" . | nindent 14 }}
            # PostgreSQL — sub-chart service: {release}-postgresql
            - name: POSTGRES_DSN
              value: "postgres://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.postgresql.auth.existingSecret }}{{ .Values.postgresql.auth.existingSecret }}{{ else }}{{ .Release.Name }}-postgresql{{ end }}
                  key: password
            # Pyroscope
            - name: PYROSCOPE_URL
              value: {{ if .Values.pyroscope.enabled }}"http://{{ .Release.Name }}-pyroscope:4040"{{ else }}""{{ end }}
            # Auth
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.auth.existingSecret }}{{ .Values.auth.existingSecret }}{{ else }}{{ include "dev-apm.fullname" . }}-auth{{ end }}
                  key: jwt-secret
            - name: AUTH_ENABLED
              value: {{ .Values.auth.enabled | quote }}
            - name: SESSION_DURATION
              value: {{ .Values.auth.sessionDuration | quote }}
            - name: ADMIN_EMAIL
              value: {{ .Values.auth.adminUser.email | quote }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dev-apm.fullname" . }}-auth
                  key: admin-password
            # Feature flags
            - name: FEATURE_ALERT_RULES
              value: {{ .Values.features.alertRules | quote }}
            - name: FEATURE_NOTIFICATIONS
              value: {{ .Values.features.notifications | quote }}
            - name: FEATURE_DASHBOARDS
              value: {{ .Values.features.customDashboards | quote }}
            - name: FEATURE_SLO
              value: {{ .Values.features.slo | quote }}
            - name: FEATURE_COST
              value: {{ .Values.features.costMonitoring | quote }}
            - name: FEATURE_PROFILING
              value: {{ .Values.features.profiling | quote }}
            - name: FEATURE_RUM
              value: {{ .Values.features.rum | quote }}
            - name: FEATURE_ANOMALY
              value: {{ .Values.features.anomalyDetection | quote }}
            - name: FEATURE_PIPELINES
              value: {{ .Values.features.logPipelines | quote }}
            - name: FEATURE_DEPLOYMENTS
              value: {{ .Values.features.deploymentTracking | quote }}
            - name: FEATURE_LLM
              value: {{ .Values.features.llmObservability | quote }}
            - name: FEATURE_RBAC
              value: {{ .Values.features.rbac | quote }}
            - name: GIN_MODE
              value: release
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "dev-apm.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dev-apm.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "dev-apm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP

---

{{- if .Values.backend.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "dev-apm.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dev-apm.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "dev-apm.fullname" . }}-backend
  minReplicas: {{ .Values.backend.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.backend.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
