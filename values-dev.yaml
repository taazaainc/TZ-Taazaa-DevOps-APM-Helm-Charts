# dev environment — image tags updated automatically by CI pipeline
# DO NOT edit image tags manually; they are managed by the build pipeline.
global:
  imagePullSecrets:
    - name: devops-tcr
backend:
  replicas: 1
  autoscaling:
    enabled: false
  image:
    repository: tcr.taazaa.cloud/apm-dev/backend
    tag: "dev-29"
ui:
  replicas: 1
  image:
    repository: tcr.taazaa.cloud/apm-dev/ui
    tag: "dev-26"
k8swatcher:
  image:
    repository: tcr.taazaa.cloud/apm-dev/k8swatcher
    tag: "dev-21"
ingress:
  enabled: true
  host: apm-dev.taazaahost.com
"victoria-metrics-single":
  server:
    persistentVolume:
      size: 10Gi
clickhouse:
  storage:
    size: 20Gi
postgresql:
  primary:
    persistence:
      size: 5Gi
beyla:
  enabled: false # disable until attribute config is fixed
